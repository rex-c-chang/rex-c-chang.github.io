baseURL: "https://rex-c-chang.github.io"
title: RC's Blog
paginate: 5
theme: PaperMod

defaultContentLanguage: en
defaultContentLanguageInSubdir: false

# only tags — categories taxonomy disabled (overrides Hugo's default of both)
taxonomies:
  tag: tags

enableRobotsTXT: true
enableGitInfo: true  # use git commit dates for sitemap lastmod
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: RC's Blog
  description: "Notes on backend and DevOps — Kubernetes, Azure, distributed systems, APIs, and the things I learn building and running services in production."
  keywords: [Backend, Backend Engineering, DevOps, Distributed Systems, APIs, Microservices, Kubernetes, Azure, AKS, Cloud, Software Engineering]
  author: "Rex Chang"
  # Default OpenGraph/Twitter share image (1200x630, in static/).
  images: ["/og.png"]
  DateFormat: "January 2, 2006"
  defaultTheme: light # dark, light
  disableThemeToggle: false

  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: false
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    # Add real favicon paths (place files in static/) to enable them:
    # favicon: "/favicon.ico"
    # favicon16x16: "/favicon-16x16.png"
    # favicon32x32: "/favicon-32x32.png"
    # apple_touch_icon: "/apple-touch-icon.png"
    # safari_pinned_tab: "/safari-pinned-tab.svg"

  # label:
  #   text: "Home"
  #   icon: /apple-touch-icon.png
  #   iconHeight: 35

  # profile-mode
  profileMode:
    enabled: false # needs to be explicitly set
    title: RC's Blog
    subtitle: "This is subtitle"
    imageUrl: "<img location>"
    imageWidth: 120
    imageHeight: 120
    imageTitle: my image
    buttons:
      - name: Posts
        url: posts
      - name: Tags
        url: tags

  # home-info mode is set per-language under languages.* below

  socialIcons:
    - name: github
      url: "https://github.com/rex-c-chang"
    - name: linkedin
      url: "https://www.linkedin.com/in/rex-c-chang"
    - name: stackoverflow
      url: "https://stackoverflow.com/users/8693034/rex-chang"

  # Site verification — paste the real token from Google Search Console
  # (and Bing if you use it), then uncomment. Leave commented otherwise.
  # analytics:
  #   google:
  #     SiteVerificationTag: ""
  #   bing:
  #     SiteVerificationTag: ""

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  # editPost:
  #   URL: "https://github.com/<path_to_repo>/content"
  #   Text: "Suggest Changes" # edit text
  #   appendFilePath: true # to append file path to Edit link

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]
languages:
  en:
    languageName: "English"
    languageCode: en-us
    weight: 1
    title: "RC's Blog"
    params:
      description: "Notes on backend and DevOps — Kubernetes, Azure, distributed systems, APIs, and the things I learn building and running services in production."
      homeInfoParams:
        Title: "Hi there \U0001F44B"
        Content: Welcome to my blog! This is a space where I share my thoughts and insights on a variety of topics, from technology to personal growth and development.
    menu:
      main:
        - identifier: posts
          name: Posts
          url: /posts/
          weight: 5
        - identifier: tags
          name: Tags
          url: /tags/
          weight: 20
        - identifier: archives
          name: Archives
          url: /archives/
          weight: 30

  zh-tw:
    languageName: "繁體中文"
    languageCode: zh-tw
    weight: 2
    title: "RC 的部落格"
    params:
      description: "後端工程與 DevOps 的筆記——Kubernetes、Azure、分散式系統、API，以及在打造與維運服務時學到的事。"
      homeInfoParams:
        Title: "嗨 \U0001F44B"
        Content: 歡迎來到我的部落格！這裡是我分享想法與心得的地方，主題涵蓋技術、個人成長等各種領域。
    menu:
      main:
        - identifier: posts
          name: 文章
          url: /posts/
          weight: 5
        - identifier: tags
          name: 標籤
          url: /tags/
          weight: 20
        - identifier: archives
          name: 封存
          url: /archives/
          weight: 30
# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai
